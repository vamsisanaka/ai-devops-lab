apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: flask-app-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: flask-app
      rules:
        - alert: HighErrorRate
          expr: rate(flask_http_request_total{status=~"4..|5.."}[5m]) > 0.1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "High error rate on Flask app"
            description: "Error rate is above 10% for more than 1 minute"

        - alert: HighLatency
          expr: histogram_quantile(0.95, rate(flask_http_request_duration_seconds_bucket[5m])) > 0.5
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "High latency on Flask app"
            description: "P95 latency is above 500ms for more than 1 minute"

        - alert: AppDown
          expr: up{job="flask-app-flask"} == 0
          for: 30s
          labels:
            severity: critical
          annotations:
            summary: "Flask app is down"
            description: "Flask app has been unreachable for 30 seconds"
